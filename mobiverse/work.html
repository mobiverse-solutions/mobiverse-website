<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Inquiry Form</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

<style>
  .nav-line {
    height: 1px;
    background: #9ca3af;
  }

  .active-line {
    background: #ef4444;
  }

  .mobile-overlay {
    display: none;
  }

  .mobile-panel {
    transform: translateX(100%);
  }
</style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
   <!-- Navigation Bar -->
  <header class="sticky top-0 bg-white z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 lg:px-12 py-5 md:py-6">
      <div class="flex items-center justify-between">
        <a href="index.html">
          <img src="images/1697717667618.jpg" alt="Mobiverse Logo" class="h-10 w-auto">
        </a>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex items-start gap-x-12 md:gap-x-16 lg:gap-x-24 text-sm md:text-sm font-medium">
          <div class="flex flex-col items-center">
            <div class="nav-line w-16 md:w-20"></div>
            <a href="do.html" class="text-gray-700 hover:text-black transition">What we do</a>
          </div>
          <div class="flex flex-col items-center">
            <div class="nav-line w-16 md:w-20"></div>
            <a href="about.html" class="text-gray-700 hover:text-black transition">What we're about</a>
          </div>
          <div class="flex flex-col items-center">
            <div class="nav-line active-line w-16 md:w-20"></div>
            <a href="work.html" class="font-semibold text-black">Work with us</a>
          </div>
        </nav>

        <!-- Mobile Hamburger -->
        <button id="menuBtn" class="md:hidden flex flex-col gap-1.5 p-2 z-50" aria-label="Open menu">
          <span class="block w-6 h-0.5 bg-gray-900 transition-all duration-300" id="bar1"></span>
          <span class="block w-6 h-0.5 bg-gray-900 transition-all duration-300" id="bar2"></span>
          <span class="block w-6 h-0.5 bg-gray-900 transition-all duration-300" id="bar3"></span>
        </button>
      </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-overlay fixed inset-0 bg-black/40 z-40" id="mobileOverlay"></div>
    <div class="mobile-panel fixed top-0 right-0 w-72 h-full bg-white z-50 shadow-2xl flex flex-col" id="mobilePanel">
      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100">
        <img src="images/1697717667618.jpg" alt="Mobiverse" class="h-8 w-auto">
        <button id="closeMenu" class="p-2" aria-label="Close menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <nav class="flex flex-col gap-1 px-6 py-8">
        <a href="do.html" class="py-3 px-4 text-gray-700 hover:bg-gray-50 rounded-lg font-medium transition">What we do</a>
        <a href="about.html" class="py-3 px-4 text-gray-700 hover:bg-gray-50 rounded-lg font-medium transition">What we're about</a>
        <a href="work.html" class="py-3 px-4 text-gray-700 hover:bg-gray-50 rounded-lg font-medium transition">Work with us</a>
      </nav>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="relative h-[400px] overflow-hidden">
    <img
      src="images/bg.png"
      alt="Hero Background"
      class="absolute inset-0 w-full h-full object-cover"
    >

    <div class="absolute inset-0 bg-black/50"></div>

    <div class="relative z-10 h-full flex items-center justify-center px-6">
      <div class="text-center text-white">
        <h1 class="text-4xl md:text-6xl font-bold">
          Work With Us
        </h1>
        <p class="mt-4 text-lg md:text-xl">
          Tell us about your project and let's build something amazing together.
        </p>
      </div>
    </div>
  </section>

  <!-- Form Section -->
  <section class="max-w-4xl mx-auto px-6 py-20">
    <div class="bg-white rounded-2xl shadow-lg p-8 md:p-10">

      <div class="mb-8 text-center">
        <h2 class="text-3xl font-bold text-gray-900">
          Tell Us About Your Project
        </h2>
        <p class="text-gray-600 mt-2">
          Fill out the form below and we'll get back to you soon.
        </p>
      </div>

      <form class="space-y-6">

        <!-- Name -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              First Name
            </label>
            <input
              type="text"
              placeholder="John"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none transition"
            >
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Last Name
            </label>
            <input
              type="text"
              placeholder="Doe"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none transition"
            >
          </div>

        </div>

        <!-- Email & Phone -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Email
            </label>
            <input
              type="email"
              placeholder="john@example.com"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none transition"
            >
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Phone Number
            </label>
            <input
              type="tel"
              placeholder="+233 XX XXX XXXX"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none transition"
            >
          </div>

        </div>

        <!-- Website -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Website <span class="text-gray-400">(Optional)</span>
          </label>
          <input
            type="url"
            placeholder="https://yourwebsite.com"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none transition"
          >
        </div>

        <!-- Project Description -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Tell Us About Your Project
          </label>
          <textarea
            rows="6"
            placeholder="Describe your project, goals, requirements, and any other details..."
            class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none resize-none transition"
          ></textarea>
        </div>

        <!-- Budget & Timeline -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              Your Budget
            </label>
            <select
              class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none transition"
            >
              <option>Select Budget</option>
              <option>Under $1,000</option>
              <option>$1,000 - $5,000</option>
              <option>$5,000 - $10,000</option>
              <option>$10,000+</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">
              What Is Your Timeline?
            </label>
            <select
              class="w-full px-4 py-3 border border-gray-300 rounded-lg bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 focus:outline-none transition"
            >
              <option>Select Timeline</option>
              <option>ASAP</option>
              <option>1 - 2 Months</option>
              <option>3 - 6 Months</option>
              <option>6+ Months</option>
            </select>
          </div>

        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button
            type="submit"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-lg transition duration-300"
          >
            Submit Project Request
          </button>
        </div>

      </form>

    </div>
  </section>
<!-- Scripts -->
  <script>
    // Mobile menu
    const menuBtn = document.getElementById('menuBtn');
    const closeMenu = document.getElementById('closeMenu');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const mobilePanel = document.getElementById('mobilePanel');

    function openMenu() {
      mobileOverlay.classList.add('open');
      mobilePanel.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeMenuFn() {
      mobileOverlay.classList.remove('open');
      mobilePanel.classList.remove('open');
      document.body.style.overflow = '';
    }
    menuBtn.addEventListener('click', openMenu);
    closeMenu.addEventListener('click', closeMenuFn);
    mobileOverlay.addEventListener('click', closeMenuFn);

    // Scroll reveal
    const revealEls = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });
    revealEls.forEach(el => observer.observe(el));
  </script>
</body>
</html>
